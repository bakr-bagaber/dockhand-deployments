name: localai

# LocalAI — Self-hosted OpenAI-compatible LLM inference server.
# Supports llama.cpp, transformers, diffusers, whisper, and more.
# Models are loaded from the localai_models volume.
# After stack is up, use POST /models/load to load specific models.

services:
  # ── LocalAI API Server ───────────────────────────────────────────
  localai_api:
    image: quay.io/go-skynet/local-ai:master
    container_name: localai_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - localai_models:/models
    environment:
      # Build type: cublas = CUDA-enabled llama.cpp
      - BUILD_TYPE=cublas
      # Context size (increase for longer texts)
      - CONTEXT_SIZE=32768
      # Parallelism
      - THREADS=6
      # Enable CORS for local dev
      - CORS=true
      - CORS_ALLOW_ORIGINS=*
      # Debug
      - DEBUG=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/readyz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      ops.managed: "true"
      ops.service: "localai"
      ops.component: "api"
    networks:
      - localai_default

networks:
  localai_default:
    name: localai_default
    driver: bridge
    labels:
      ops.managed: "true"
      ops.service: "localai"

volumes:
  localai_models:
    name: localai_models
