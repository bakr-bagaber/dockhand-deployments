x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  healthcheck:
    test: ["CMD", "node", "healthcheck.mjs"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  omniroute:
    <<: *common
    container_name: omniroute
    image: omniroute:base
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${PORT:-20128}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=0.0.0.0
    ports:
      - "${PORT:-20128}:${PORT:-20128}"
      - "${API_PORT:-20129}:${API_PORT:-20129}"
    volumes:
      - omniroute_data:/app/data

volumes:
  omniroute_data:
    name: omniroute_data
