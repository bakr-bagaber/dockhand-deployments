x-common: &common
  restart: unless-stopped
  stop_grace_period: 30s

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    network_mode: host
    environment:
      - OPENAI_API_BASE_URL=http://localhost:20129/v1
      - OPENAI_API_KEY=ignored
      - PORT=8083
    volumes:
      - open-webui_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health | grep -q '\"status\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      ops.managed: "true"
      ops.service: "open-webui"
      ops.component: "webui"

volumes:
  open-webui_data:
    name: open-webui_data
