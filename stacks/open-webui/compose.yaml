x-common: &common
  restart: unless-stopped
  stop_grace_period: 30s

services:
  open-webui:
    <<: *common
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:20129/v1
      - WEBUI_PORT=8080
    ports:
      - "127.0.0.1:8083:8080"
    volumes:
      - open-webui_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q '\"status\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      ops.managed: "true"
      ops.service: "open-webui"
      ops.component: "webui"

volumes:
  open-webui_data:
    name: open-webui_data
