name: llama-cpp

# Qwen3-Embedding-4B deployment with dimension-reducing wrappers.
# All services use CPU-only llama.cpp server (no GPU).
#
# Port layout:
#   8090: llama.cpp native server (2560 dims, no wrapper)
#   8091: wrapper → 1024 dims
#   8092: wrapper → 1536 dims
#   8093: wrapper → 2048 dims
#
# Model: Qwen3-Embedding-4B-Q4_K_M.gguf
# After stack up, seed model: docker cp Qwen3-Embedding-4B-Q4_K_M.gguf llama_cpp_embed:/models/

services:
  # ── Native llama.cpp server (2560 dims, no wrapper) ────────────
  Qwen3-Embedding-4B-Q4_K_M:
    image: ops/llamacpp-embed:local
    container_name: Qwen3-Embedding-4B-Q4_K_M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 5G
    volumes:
      - llama_cpp_embed:/models
    entrypoint: ["/bin/bash", "-lc"]
    command: ["env -u LD_LIBRARY_PATH /app/llama-server -m /models/Qwen3-Embedding-4B-Q4_K_M.gguf --embeddings -ngl 0 -c 32768 --threads 6 --host 0.0.0.0 --port 8080"]
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      ops.managed: "true"
      ops.service: llama-cpp
      ops.component: embedding-server
      ops.model: Qwen3-Embedding-4B-Q4_K_M
    networks:
      - llama_cpp_embed_net

  # ── Wrapper: 1024 dims ─────────────────────────────────────────
  Qwen3-Embedding-4B-Q4_K_M-1024:
    image: ops/llamacpp-wrap:local
    container_name: Qwen3-Embedding-4B-Q4_K_M-1024
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - llama_cpp_embed:/models
    ports:
      - "127.0.0.1:8091:8080"
    labels:
      ops.managed: "true"
      ops.service: llama-cpp
      ops.component: embedding-wrapper
      ops.wrapper_dims: "1024"
    networks:
      - llama_cpp_embed_net

  # ── Wrapper: 1536 dims ─────────────────────────────────────────
  Qwen3-Embedding-4B-Q4_K_M-1536:
    image: ops/llamacpp-wrap:local
    container_name: Qwen3-Embedding-4B-Q4_K_M-1536
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - llama_cpp_embed:/models
    ports:
      - "127.0.0.1:8092:8080"
    labels:
      ops.managed: "true"
      ops.service: llama-cpp
      ops.component: embedding-wrapper
      ops.wrapper_dims: "1536"
    networks:
      - llama_cpp_embed_net

  # ── Wrapper: 2048 dims ─────────────────────────────────────────
  Qwen3-Embedding-4B-Q4_K_M-2048:
    image: ops/llamacpp-wrap:local
    container_name: Qwen3-Embedding-4B-Q4_K_M-2048
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - llama_cpp_embed:/models
    ports:
      - "127.0.0.1:8093:8080"
    labels:
      ops.managed: "true"
      ops.service: llama-cpp
      ops.component: embedding-wrapper
      ops.wrapper_dims: "2048"
    networks:
      - llama_cpp_embed_net

networks:
  llama_cpp_embed_net:
    name: llama_cpp_embed_net
    driver: bridge
    labels:
      ops.managed: "true"
      ops.service: llama-cpp

volumes:
  llama_cpp_embed:
    name: llama_cpp_embed
