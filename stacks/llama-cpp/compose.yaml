name: llama-cpp

# All services start mode=stopped. Only the benchmark orchestrator
# (benchmark-llm-models.py) starts individual services one at a time,
# runs the HTTP benchmark, collects stats, then stops and removes the
# container before moving to the next model.
#
# IMPORTANT — WSL/docker.exe bind mount limitation:
#   Bind mounts from WSL paths (e.g. /home/bakrb/...) into docker.exe are
#   EMPTY inside containers. Only named Docker volumes work reliably.
#   Model files are seeded via `docker cp` (which works correctly).
#   Run `seed-llama-cpp-models.sh` before first use or after model changes.

services:
  # ── Gemma 4 26B MoE ──────────────────────────────────────────────
  gemma-4-26B-A4B-it-UD-Q4_K_M:
    image: ops/llamacpp-cuda-b8756:local
    container_name: bm_gemma-4-26B
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - gemma-4-26B-A4B-it-UD-Q4_K_M:/models:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: ["env -u LD_LIBRARY_PATH /app/llama-server -m /models/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf --mmproj /models/mmproj-F16.gguf -ngl 999 -cmoe -c 262144 --fit on --fit-target 512 --threads 6 --host 0.0.0.0 --port 8080"]
    ports:
      - "8090:8080"
    restart: "no"

